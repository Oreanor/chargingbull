<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&P 500 — Bear Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a10;
    --fg: #f5f3ee;
    --muted: rgba(245,243,238,0.5);
    --gold: #c9a961;
    --accent: #e8c87c;
    --crisis: #ff6b5c;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
  }

  /* Sticky chart stage */
  #stage {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }
  #cv { width: 100%; height: 100%; display: block; }

  /* Gradient: dim the left third so the card on top stays readable */
  #stage::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    background: linear-gradient(to right,
      rgba(10,10,16,0.78) 0%,
      rgba(10,10,16,0.40) 30%,
      rgba(10,10,16,0) 52%);
    z-index: 2;
  }
  @media (max-width: 720px) {
    #stage::after {
      background: linear-gradient(to bottom,
        rgba(10,10,16,0) 25%,
        rgba(10,10,16,0.85) 75%);
    }
  }

  /* Scrollable content (cards) */
  #scroller {
    position: relative;
    z-index: 3;
    pointer-events: none;
  }

  .step {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 80px 24px;
  }
  .step:first-child { padding-top: 100px; }

  .step-card {
    pointer-events: auto;
    max-width: 360px;
    margin-left: clamp(24px, 4vw, 56px);
    background: rgba(10,10,16,0.86);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(201,169,97,0.18);
    border-radius: 4px;
    padding: 26px 30px 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.55);
  }
  .step-card::before {
    content: '';
    display: block;
    width: 28px; height: 1px;
    background: var(--gold);
    margin-bottom: 18px;
  }

  .step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -0.4px;
    color: var(--fg);
    margin-bottom: 18px;
  }

  .step-comment {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(245,243,238,0.85);
    font-weight: 300;
  }
  .step-comment b { color: var(--accent); font-weight: 600; }

  /* Chart caption — units & description, fixed under the chart */
  #chart-caption {
    position: fixed;
    right: 24px;
    bottom: 16px;
    z-index: 40;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    text-align: right;
    max-width: 60vw;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85);
  }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 20px 32px;
    z-index: 50;
    pointer-events: none;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.85);
  }
  .brand .small {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: -2px;
    font-weight: 500;
  }


  @media (max-width: 720px) {
    .step { padding: 60px 16px; }
    .step:first-child { padding-top: 80px; }
    .step-card { margin-left: 0; padding: 26px 24px 30px; max-width: 100%; }
    .step-title { font-size: 28px; }
    .top-bar { padding: 14px 18px; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>


<div class="top-bar">
  <div class="brand">
    <span class="small">Wall Street · 1973–2026</span>
    Bear Markets
  </div>
</div>

<div id="chart-caption"></div>

<div id="scroller"><div id="steps-container"></div></div>

<script>
// Full-width chart: card overlays on top (gradient handles readability).
// Right padding leaves room for axis labels.
function computePad() {
  return { l: 32, r: 100, t: 60, b: 60 };
}
let PAD = computePad();
const GRID = '#1f1f28';
const AXIS = 'rgba(245,243,238,0.55)';
const CRISIS = '#ff6b5c';
const MUTED = '#5a5a62';
const FONT = '14px Inter, system-ui, sans-serif';
const FONT_BOLD = 'bold 14px Inter, system-ui, sans-serif';
const FONT_BIG = 'bold 15px Inter, system-ui, sans-serif';
const BG = '#0a0a10';

const CRISES = [
  { peak:[1973, 1],  trough:[1974, 9],  troughLbl:'Sep 1974',  label: '1973–74' },
  { peak:[1987, 8],  trough:[1987,11],  troughLbl:'Nov 1987',  label: '1987' },
  { peak:[2000, 8],  trough:[2002, 9],  troughLbl:'Sep 2002',  label: '2000' },
  { peak:[2007,10],  trough:[2009, 3],  troughLbl:'Mar 2009',  label: '2008' },
  { peak:[2020, 1],  trough:[2020, 3],  troughLbl:'Mar 2020',  label: '2020' },
];
const ymToX = ([y, m]) => y + (m - 1) / 12;
const ymToIdx = (xs, ym) => Math.round((ymToX(ym) - xs[0]) * 12);
const fmtPct = p => (p === 100 ? '0%' : (p > 100 ? '+' + Math.round(p - 100) : '−' + Math.round(100 - p)) + '%');
const lerp = (a, b, t) => a + (b - a) * t;
const hexRgb = h => { const x = h.replace('#',''); return [parseInt(x.slice(0,2),16), parseInt(x.slice(2,4),16), parseInt(x.slice(4,6),16)]; };
const lerpColor = (a, b, t) => {
  const ra = hexRgb(a), rb = hexRgb(b);
  return `rgb(${Math.round(lerp(ra[0],rb[0],t))},${Math.round(lerp(ra[1],rb[1],t))},${Math.round(lerp(ra[2],rb[2],t))})`;
};

// $350k вложили в S&P в октябре 1987 → февраль 2021
const INVEST = 350000;
const PURCHASE_M = [1987, 10];
const COMPARE_M = [2021, 2];
function getInvest() {
  const iP = ymToIdx(xs, PURCHASE_M);
  const iC = ymToIdx(xs, COMPARE_M);
  if (iP < 0 || iC < 0 || !isFinite(yNom[iP]) || !isFinite(yReal[iP])) return null;
  const nomMult = yNom[iC] / yNom[iP];
  const realMult = yReal[iC] / yReal[iP];
  return { nomVal: INVEST * nomMult, realVal: INVEST * realMult, nomMult, realMult };
}
const fmtMln = v => '$' + (v / 1e6).toFixed(2) + 'M';

// Параметры графика для каждого вида (без текста — текст в STEPS)
const SLIDE_DATA = {
  '0a': { years: [1987], focus: 1987, yMin: 70 },
  '0b': { years: [1987, 2020], focus: 2020, yMin: 70 },
  '0c': { years: [1987, 2020, 2007], focus: 2007, yMin: 40 },
  '0d': { years: [1987, 2020, 2007, 1973], focus: 1973, yMin: 40 },
  '0e': { years: [1987, 2020, 2007, 1973, 2000], focus: 2000, yMin: 40 },
};

function viewConfig(key) {
  if (key === '1') {
    return { kind: 'state1', xMin: 1970, xMax: 2026, yMin: 0, yMax: 200,
      visibleYears: [1973, 1987, 2000, 2007, 2020], focusAll: true };
  }
  if (key === '1a') {
    return { kind: 'state2', mode: 'nominal', modeBlend: 0,
      xMin: 1970, xMax: 2026, yClip: 5000,
      visibleYears: [1973, 1987, 2000, 2007, 2020],
      showCrisisSegments: true, bullAlpha: 0, investAlpha: 0 };
  }
  if (key === '1b') {
    return { kind: 'state2', mode: 'nominal', modeBlend: 0,
      xMin: 1986, xMax: 1991, yClip: 500,
      visibleYears: [1987], showCrisisSegments: true,
      bullAlpha: 1, investAlpha: 0 };
  }
  if (key === '2' || key === '3') {
    const isReal = key === '3';
    return { kind: 'state2', mode: isReal ? 'real' : 'nominal',
      modeBlend: isReal ? 1 : 0,
      xMin: 1970, xMax: 2026, yClip: 5000,
      visibleYears: [1973, 1987, 2000, 2007, 2020],
      showInvestment: true, showCrisisSegments: false,
      isReal, bullAlpha: 0, investAlpha: 1 };
  }
  const s = SLIDE_DATA[key];
  return { kind: 'slide', xMin: 0, xMax: 24, yMin: s.yMin, yMax: 105,
    visibleYears: s.years, focusYear: s.focus, focusAll: false };
}

// ==== STEPS (cards) — 10 шагов в порядке прокрутки =========================
const PHOTO_2008 = 'https://commons.wikimedia.org/wiki/Special:FilePath/Lehman_Brothers_Times_Square_by_David_Shankbone.jpg';
const PHOTO_2020 = 'https://commons.wikimedia.org/wiki/Special:FilePath/Times_Square_empty.jpg';
const PHOTO_1973 = 'https://commons.wikimedia.org/wiki/Special:FilePath/' + encodeURIComponent("BIRD'S EYE VIEW OF AN AVERAGE GAS STATION IN PORTLAND DURING THE EARLY MORNING HOURS OF PUMPING WHEN GAS WAS LIMITED... - NARA - 555457.jpg");

const STEPS = [
  { view: '0a', date: 'October 19, 1987', title: 'Black Monday',
    image: 'img/crisis_1987.jpg',
    comment: 'In a single day S&P 500 plunged <b>−20%</b> — still the largest one-day crash in Wall Street history. About $500 billion of market cap evaporated in hours. Margin calls hit brokers in waves, NYSE trading barely crawled, the Hong Kong exchange shut for the rest of that week. By early December the peak-to-trough drawdown reached <b>−33%</b>.' },
  { view: '0b', date: 'February — March 2020', title: 'COVID',
    image: PHOTO_2020,
    comment: 'The fastest plunge in history: <b>−19% real in a month</b> (nominal −34% from peak to March 23). The fall was so abrupt that US exchanges automatically halted trading four times in two weeks — unseen since 1987. Trigger: the global lockdown, an instantaneous freeze of everything from aviation to restaurants.' },
  { view: '0c', date: 'Oct 2007 — Mar 2009', title: 'Global Financial Crisis',
    image: PHOTO_2008,
    comment: 'Unlike a single-day shock — slow torture lasting <b>17 months and −53% in real $</b>. The subprime mortgage bubble burst: banks fell one after another, Lehman Brothers (158 years on the market) collapsed over a single weekend on September 15, 2008. Millions of Americans saw their 401(k) retirement accounts turn into "201(k)s" — the running joke of the era.' },
  { view: '0d', date: '1973 — 1974', title: 'Oil & Stagflation',
    image: PHOTO_1973,
    comment: '<b>21 months of relentless grinding, −52% in real $.</b> OPEC quadrupled the price of oil; gas station lines stretched for hours. At the same time US inflation accelerated to 12% with unemployment at 8% — a combination economists hadn\'t seen and considered impossible.' },
  { view: '0e', date: '2000 — 2002', title: 'Dotcom Bust',
    image: 'img/crisis_2000.jpg',
    comment: 'Over 25 months <b>$5 trillion</b> of market capitalization evaporated — more than Germany\'s annual GDP at the time. NASDAQ lost <b>−78%</b> (hundreds of "new economy" names left the exchange forever); broad S&P fell <b>−42% real</b>. Compounded by 9/11 and the Enron & WorldCom corporate scandals.' },
  { view: '1', date: '1970 — 2026', title: 'A real roller coaster?',
    comment: 'Look at this: regular drops of <b>30 to 50%</b>, long climbs out of the pit. On the scale of any single life, this is a real roller coaster — the kind that makes people swear off the market for good. But hold that thought for one more frame…' },
  { view: '1a', date: '1970 — 2026', title: 'Each one bounced back',
    comment: 'Today (2026) S&P is around <b>5000</b> — after 1987 the price grew more than 14×, after 2008 already 5×. On the long timeline, what felt like a catastrophe shrinks to a notch.' },
  { view: '1b', date: 'December 1989', title: 'Charging Bull',
    comment: 'A small irony hiding in this curve: when Arturo Di Modica rolled his bull onto Wall Street in December 1989 — as «a symbol of strength in response to the crash» — the S&P 500 had already been back at its pre-1987 high for almost <b>five months</b>. The bronze answer arrived after the recovery.' },
  { view: '2', date: 'Oct 1987 → Feb 2021', title: '$350k in S&P',
    comment: 'If those same <b>$350k</b> (the cost of the sculpture) had instead been put into S&P 500 in October 1987, by February 2021 (the GameStop mania peak) the portfolio would be worth <b>$4.85M</b> nominal — ×13.9 over 33 years, dividends excluded.' },
  { view: '3', date: 'Same, in real $', title: 'Minus inflation',
    comment: 'But that\'s nominal. Adjusted for inflation, the real value is only <b>$2.13M</b> (×6.1). Inflation ate roughly <b>$2.72M</b> of the nominal gains — slower growth, longer recoveries.' },
];

// ==== Глобальное состояние =================================================
let xs = [], yNom = [], yReal = [];
let mode = 'nominal';
let scale = 'lin';
let fromKey = STEPS[0].view, toKey = STEPS[0].view, animT = 1;
const ys = () => mode === 'nominal' ? yNom : yReal;

function applyAutoModeScale(key) {
  // 0a–0e and "1" — drawdown views, real prices (so % matches the texts).
  // 1a/1b/2 — nominal price chart. 3 — real price chart.
  if (key === '3') { mode = 'real'; scale = 'lin'; }
  else if (key === '1a' || key === '1b' || key === '2') { mode = 'nominal'; scale = 'lin'; }
  else { mode = 'real'; scale = 'lin'; }
}

// Caption (units & description) shown under the chart, updates per view.
const CAPTION = {
  '0a': '01 — S&P 500, drawdown from peak. Monthly, real (CPI-adjusted)',
  '0b': '02 — S&P 500, drawdown from peak. Monthly, real (CPI-adjusted)',
  '0c': '03 — S&P 500, drawdown from peak. Monthly, real (CPI-adjusted)',
  '0d': '04 — S&P 500, drawdown from peak. Monthly, real (CPI-adjusted)',
  '0e': '05 — S&P 500, drawdown from peak. Monthly, real (CPI-adjusted)',
  '1':  '06 — Each crisis normalized to its own peak = 100%. Monthly, real',
  '1a': '07 — S&P 500 nominal price. Monthly. Source: Robert Shiller',
  '1b': '08 — S&P 500 nominal price, zoom 1986–1991. Monthly',
  '2':  '09 — S&P 500 nominal price + a hypothetical $350k buy-and-hold from Oct 1987',
  '3':  '10 — S&P 500 real price (CPI-adjusted) + the same $350k position',
};

// ==== Загрузка данных ======================================================
fetch('data/sp500_shiller_monthly.csv')
  .then(r => r.text())
  .then(text => {
    for (const line of text.trim().split('\n').slice(1)) {
      const c = line.split(',');
      const date = c[0], sp500 = c[1], rp = c[6];
      if (date >= '1926-01' && sp500) {
        const [y, m] = date.split('-');
        xs.push(+y + (+m - 1) / 12);
        yNom.push(parseFloat(sp500));
        const r = parseFloat(rp);
        yReal.push(r > 0 ? r : NaN);
      }
    }
    renderSteps();
    setupScroll();
    applyProgress(0);
  });

// ==== Рендер шагов =========================================================
function renderSteps() {
  const c = document.getElementById('steps-container');
  c.innerHTML = STEPS.map((s, i) => `
    <section class="step" data-step="${i}">
      <div class="step-card">
        <h2 class="step-title">${s.title}</h2>
        <p class="step-comment">${s.comment}</p>
      </div>
    </section>
  `).join('');
}

// ==== Скролл-драйвер =======================================================
const DWELL_HOLD_FRAC = 0.32;

function computeProgress() {
  const stepEls = document.querySelectorAll('.step');
  const N = stepEls.length;
  if (N === 0) return 0;
  const vpH = window.innerHeight;
  const vpCenter = vpH / 2;
  const scrollY = window.scrollY;
  const anchors = [];
  for (let i = 0; i < N; i++) {
    const r = stepEls[i].getBoundingClientRect();
    const docCenter = r.top + scrollY + r.height / 2;
    anchors.push(docCenter - vpCenter);
  }
  if (scrollY <= anchors[0]) return 0;
  if (scrollY >= anchors[N - 1]) return N - 1;
  for (let i = 0; i < N - 1; i++) {
    if (scrollY >= anchors[i] && scrollY <= anchors[i + 1]) {
      const range = anchors[i + 1] - anchors[i];
      const t = (scrollY - anchors[i]) / range;
      let p;
      if (t < DWELL_HOLD_FRAC) p = 0;
      else if (t > 1 - DWELL_HOLD_FRAC) p = 1;
      else p = (t - DWELL_HOLD_FRAC) / (1 - 2 * DWELL_HOLD_FRAC);
      return i + p;
    }
  }
  return 0;
}

function applyProgress(progress) {
  const i = Math.floor(progress);
  const p = progress - i;
  const fromIdx = Math.min(i, STEPS.length - 1);
  const toIdx = Math.min(i + 1, STEPS.length - 1);
  fromKey = STEPS[fromIdx].view;
  toKey = STEPS[toIdx].view;
  animT = p;
  // mode/scale: snap к доминирующему шагу
  const dominantKey = p < 0.5 ? fromKey : toKey;
  applyAutoModeScale(dominantKey);
  drawNow();
  // chart caption
  const cap = document.getElementById('chart-caption');
  if (cap) cap.textContent = CAPTION[dominantKey] || '';

}

function setupScroll() {
  // Ставим высоту body, чтобы хватало на все шаги (по 100vh каждый)
  let scheduled = false;
  function tick() {
    scheduled = false;
    applyProgress(computeProgress());
  }
  window.addEventListener('scroll', () => {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(tick);
  }, { passive: true });
  window.addEventListener('resize', tick, { passive: true });
}

// ==== Setup canvas =========================================================
function setupCtx() {
  const cv = document.getElementById('cv');
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
  return { ctx, W, H, x0: PAD.l, y0: PAD.t, x1: W - PAD.r, y1: H - PAD.b };
}

// ==== Helpers для drawNow (slide/state1 морф) ==============================
function xValueIn(crisis, m, cfg) {
  return cfg.kind === 'state1' ? (ymToX(crisis.peak) + m / 12) : m;
}
function colorIn(crisis, cfg) {
  if (cfg.focusAll) return CRISIS;
  if (cfg.focusYear === crisis.peak[0]) return CRISIS;
  return MUTED;
}
function widthIn(crisis, cfg) {
  if (cfg.focusAll || cfg.focusYear === crisis.peak[0]) return 2.5;
  return 1.5;
}

function lerpState2Cfg(a, b, t) {
  const blend = lerp(a.modeBlend ?? (a.mode === 'real' ? 1 : 0), b.modeBlend ?? (b.mode === 'real' ? 1 : 0), t);
  return {
    kind: 'state2',
    mode: blend < 0.5 ? 'nominal' : 'real',
    modeBlend: blend,
    xMin: lerp(a.xMin, b.xMin, t),
    xMax: lerp(a.xMax, b.xMax, t),
    yClip: lerp(a.yClip, b.yClip, t),
    visibleYears: t < 0.5 ? a.visibleYears : b.visibleYears,
    showCrisisSegments: (a.showCrisisSegments || b.showCrisisSegments),
    showInvestment: (a.showInvestment || b.showInvestment),
    investAlpha: lerp(a.investAlpha || 0, b.investAlpha || 0, t),
    bullAlpha: lerp(a.bullAlpha || 0, b.bullAlpha || 0, t),
    isReal: blend >= 0.5,
  };
}

// ==== Главный диспетчер ====================================================
function drawNow() {
  if (!xs.length) return;
  const cfgA = viewConfig(fromKey);
  const cfgB = viewConfig(toKey);
  const t = animT;
  if (cfgA.kind === 'state2' && cfgB.kind === 'state2') {
    drawState2(t === 1 ? cfgB : lerpState2Cfg(cfgA, cfgB, t));
    return;
  }
  if ((cfgA.kind === 'state1' && cfgB.kind === 'state2') ||
      (cfgA.kind === 'state2' && cfgB.kind === 'state1')) {
    if (t === 1) drawState2(cfgB.kind === 'state2' ? cfgB : cfgA);
    else drawMixed(cfgA, cfgB, t);
    return;
  }
  if (cfgA.kind === 'state2' || cfgB.kind === 'state2') {
    drawState2(cfgB.kind === 'state2' ? cfgB : cfgA);
    return;
  }
  // slide ↔ slide / slide ↔ state1 — морф через лерп config
  const xMin = lerp(cfgA.xMin, cfgB.xMin, t);
  const xMax = lerp(cfgA.xMax, cfgB.xMax, t);
  const yMin = lerp(cfgA.yMin, cfgB.yMin, t);
  const yMax = lerp(cfgA.yMax, cfgB.yMax, t);
  const Y = ys();
  const { ctx, x0, y0, x1, y1 } = setupCtx();
  const sx = v => x0 + (v - xMin) / (xMax - xMin) * (x1 - x0);
  const sy = pct => y1 - (pct - yMin) / (yMax - yMin) * (y1 - y0);

  // Y-сетка
  ctx.font = FONT;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const labelCfg = t < 0.5 ? cfgA : cfgB;
  const yStep = labelCfg.kind === 'state1' ? 25 : 10;
  for (let p = Math.ceil(yMin/10)*10; p <= yMax + 0.1; p += 10) {
    if (p > 100 + 5) break;
    const y = sy(p);
    ctx.strokeStyle = p === 100 ? 'rgba(245,243,238,0.35)' : GRID;
    ctx.setLineDash(p === 100 ? [] : [2, 3]);
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
    if (p % yStep === 0) {
      ctx.fillStyle = AXIS;
      ctx.fillText(fmtPct(p), x1 + 10, y);
    }
  }
  ctx.setLineDash([]);

  // X-сетка
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = AXIS;
  ctx.strokeStyle = GRID;
  if (labelCfg.kind === 'slide') {
    for (let m = 0; m <= 24; m += 6) {
      if (m < xMin - 0.5 || m > xMax + 0.5) continue;
      const x = sx(m);
      if (m > 0) { ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke(); }
      ctx.fillText(m === 0 ? 'peak' : (m + ' mo.'), x, y1 + 8);
    }
  } else {
    for (let yr = 1970; yr <= 2030; yr += 10) {
      if (yr < xMin - 1 || yr > xMax + 1) continue;
      const x = sx(yr);
      ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
      ctx.fillText(String(yr), x, y1 + 8);
    }
  }
  ctx.strokeStyle = AXIS; ctx.beginPath();
  ctx.moveTo(x0, y1); ctx.lineTo(x1, y1); ctx.stroke();

  ctx.save();
  ctx.beginPath(); ctx.rect(x0, y0, x1 - x0, y1 - y0); ctx.clip();

  const visibleSet = new Set([...cfgA.visibleYears, ...cfgB.visibleYears]);
  const visible = CRISES.filter(c => visibleSet.has(c.peak[0]));
  const order = [...visible].sort((a, b) => {
    const aFocus = (cfgA.focusYear === a.peak[0] || cfgA.focusAll) || (cfgB.focusYear === a.peak[0] || cfgB.focusAll);
    const bFocus = (cfgA.focusYear === b.peak[0] || cfgA.focusAll) || (cfgB.focusYear === b.peak[0] || cfgB.focusAll);
    return (aFocus ? 1 : 0) - (bFocus ? 1 : 0);
  });

  for (const c of order) {
    const iP = ymToIdx(xs, c.peak), iT = ymToIdx(xs, c.trough);
    if (iP < 0 || iT < 0) continue;
    const peakPrice = Y[iP];
    if (!isFinite(peakPrice)) continue;
    const lastM = iT - iP;

    const colA = colorIn(c, cfgA), colB = colorIn(c, cfgB);
    const wdA = widthIn(c, cfgA), wdB = widthIn(c, cfgB);
    const stroke = (colA === colB) ? colA : (typeof colA === 'string' && colA.startsWith('#') && colB.startsWith('#') ? lerpColor(colA, colB, t) : colB);
    const width = lerp(wdA, wdB, t);

    const inA = cfgA.visibleYears.includes(c.peak[0]);
    const inB = cfgB.visibleYears.includes(c.peak[0]);
    let alpha = 1;
    if (inA && !inB) alpha = 1 - t;
    else if (!inA && inB) alpha = t;
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;

    ctx.strokeStyle = stroke; ctx.lineWidth = width;
    ctx.beginPath(); let st = false;
    let lastSx = 0, lastSy = 0;
    for (let m = 0; m <= lastM; m++) {
      const i = iP + m;
      if (!isFinite(Y[i])) continue;
      const yPct = (Y[i] / peakPrice) * 100;
      const xValA = xValueIn(c, m, cfgA);
      const xValB = xValueIn(c, m, cfgB);
      const xVal = lerp(xValA, xValB, t);
      const px = sx(xVal), py = sy(yPct);
      lastSx = px; lastSy = py;
      if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.fillStyle = stroke;
    ctx.beginPath(); ctx.arc(lastSx, lastSy, 2.8, 0, 2 * Math.PI); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Подписи trough'ов
  ctx.font = FONT;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  for (const c of visible) {
    const iP = ymToIdx(xs, c.peak), iT = ymToIdx(xs, c.trough);
    if (iP < 0 || iT < 0) continue;
    const peakPrice = Y[iP];
    if (!isFinite(peakPrice)) continue;
    const lastM = iT - iP;
    const i = iP + lastM;
    if (!isFinite(Y[i])) continue;
    const yPct = (Y[i] / peakPrice) * 100;
    const xValA = xValueIn(c, lastM, cfgA);
    const xValB = xValueIn(c, lastM, cfgB);
    const xVal = lerp(xValA, xValB, t);
    const px = sx(xVal), py = sy(yPct);

    const inA = cfgA.visibleYears.includes(c.peak[0]);
    const inB = cfgB.visibleYears.includes(c.peak[0]);
    let alpha = 1;
    if (inA && !inB) alpha = 1 - t;
    else if (!inA && inB) alpha = t;
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;

    ctx.fillStyle = (cfgA.focusAll || cfgB.focusAll || cfgA.focusYear === c.peak[0] || cfgB.focusYear === c.peak[0]) ? CRISIS : 'rgba(245,243,238,0.5)';
    if (px >= x0 - 2 && px <= x1 + 80 && py >= y0 && py <= y1) {
      ctx.fillText(c.troughLbl, px + 6, py);
    }
  }
  ctx.globalAlpha = 1;
}

// ==== state2 (полный график) ===============================================
function drawState2(cfg) {
  const blend = cfg.modeBlend ?? (cfg.mode === 'real' ? 1 : 0);
  let Y;
  if (blend <= 0) Y = yNom;
  else if (blend >= 1) Y = yReal;
  else {
    Y = new Array(yNom.length);
    for (let i = 0; i < yNom.length; i++) {
      const n = yNom[i], r = yReal[i];
      Y[i] = (isFinite(n) && isFinite(r)) ? (n + (r - n) * blend) : NaN;
    }
  }
  const { ctx, x0, y0, x1, y1 } = setupCtx();

  const xMin = cfg.xMin, xMax = cfg.xMax;
  const yClip = cfg.yClip;
  const sx = v => x0 + (v - xMin) / (xMax - xMin) * (x1 - x0);
  let sy;
  if (scale === 'log') {
    const lyMin = Math.log10(Math.max(1, yClip / 1000)), lyMax = Math.log10(yClip);
    sy = v => y1 - (Math.log10(Math.max(1, v)) - lyMin) / (lyMax - lyMin) * (y1 - y0);
  } else {
    sy = v => y1 - v / yClip * (y1 - y0);
  }

  // Y-сетка
  ctx.font = FONT;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = AXIS;
  if (scale === 'log') {
    const lyMin = Math.log10(Math.max(1, yClip / 100)), lyMax = Math.log10(yClip);
    for (let p = Math.ceil(lyMin); p <= lyMax; p++) {
      const v = Math.pow(10, p), y = sy(v);
      ctx.strokeStyle = GRID; ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      ctx.fillText(v >= 1000 ? (v/1000) + 'k' : String(v), x1 + 10, y);
    }
  } else {
    const step = yClip > 5000 ? 1000 : yClip > 2000 ? 500 : yClip > 700 ? 100 : 50;
    for (let v = 0; v <= yClip + 0.1; v += step) {
      const y = sy(v);
      ctx.strokeStyle = GRID; ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      ctx.fillText(v >= 1000 ? (v/1000) + 'k' : String(v), x1 + 10, y);
    }
  }

  // X-сетка
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = AXIS;
  ctx.strokeStyle = GRID;
  const xSpan = xMax - xMin;
  const xStep = xSpan > 30 ? 10 : xSpan > 10 ? 5 : 1;
  const xStart = Math.ceil(xMin / xStep) * xStep;
  for (let yr = xStart; yr <= xMax; yr += xStep) {
    const x = sx(yr);
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    ctx.fillText(String(yr), x, y1 + 8);
  }
  ctx.strokeStyle = AXIS; ctx.beginPath();
  ctx.moveTo(x0, y1); ctx.lineTo(x1, y1); ctx.stroke();

  const iPurchase = ymToIdx(xs, PURCHASE_M);
  const iCompare = ymToIdx(xs, COMPARE_M);
  const iStart = Math.max(0, ymToIdx(xs, [Math.floor(xMin), 1]));
  const iEnd = Math.min(xs.length - 1, ymToIdx(xs, [Math.ceil(xMax), 12]));

  ctx.save();
  ctx.beginPath(); ctx.rect(x0, y0, x1 - x0, y1 - y0); ctx.clip();

  const drawSegment = (iFrom, iTo, color, width) => {
    if (iFrom < 0 || iTo >= xs.length || iFrom > iTo) return;
    ctx.strokeStyle = color; ctx.lineWidth = width;
    ctx.beginPath(); let st = false;
    for (let i = iFrom; i <= iTo; i++) {
      if (!isFinite(Y[i])) { st = false; continue; }
      const px = sx(xs[i]), py = sy(Y[i]);
      if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py);
    }
    ctx.stroke();
  };

  const investAlpha = cfg.investAlpha || 0;
  if (investAlpha > 0.01) {
    drawSegment(iStart, Math.min(iPurchase, iEnd), MUTED, 1.2);
    ctx.save(); ctx.globalAlpha = investAlpha;
    drawSegment(Math.max(iPurchase, iStart), Math.min(iCompare, iEnd), CRISIS, 2.5);
    ctx.restore();
    if (investAlpha < 1) {
      ctx.save(); ctx.globalAlpha = 1 - investAlpha;
      drawSegment(Math.max(iPurchase, iStart), Math.min(iCompare, iEnd), MUTED, 1.2);
      ctx.restore();
    }
    drawSegment(Math.max(iCompare, iStart), iEnd, MUTED, 1.2);
  } else {
    drawSegment(iStart, iEnd, MUTED, 1.2);
  }

  if (cfg.showCrisisSegments) {
    ctx.font = FONT;
    for (const c of CRISES) {
      const iP = ymToIdx(xs, c.peak), iT = ymToIdx(xs, c.trough);
      if (iP < 0 || iT >= xs.length) continue;
      if (xs[iP] < xMin) continue;
      if (!isFinite(Y[iP]) || !isFinite(Y[iT])) continue;
      ctx.strokeStyle = CRISIS; ctx.lineWidth = 2.5;
      ctx.beginPath(); let st = false;
      for (let i = iP; i <= iT; i++) {
        if (!isFinite(Y[i])) continue;
        const px = sx(xs[i]), py = sy(Y[i]);
        if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.fillStyle = CRISIS;
      for (const i of [iP, iT]) {
        ctx.beginPath(); ctx.arc(sx(xs[i]), sy(Y[i]), 2.8, 0, 2*Math.PI); ctx.fill();
      }
      const drop = ((Y[iT] - Y[iP]) / Y[iP]) * 100;
      ctx.fillStyle = CRISIS; ctx.save();
      ctx.translate(sx(xs[iP]) - 3, sy(Y[iP]) - 6); ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(`${c.label}  ${drop.toFixed(0)}%`, 0, 0); ctx.restore();
    }
  }

  ctx.restore();

  if (investAlpha > 0.01 && iPurchase >= 0 && iCompare >= 0) {
    ctx.save(); ctx.globalAlpha = investAlpha;
    const xP = sx(xs[iPurchase]), yP = sy(Y[iPurchase]);
    const xC = sx(xs[iCompare]), yC = sy(Y[iCompare]);
    ctx.strokeStyle = CRISIS; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(xP, y0); ctx.lineTo(xP, y1); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = CRISIS;
    ctx.beginPath(); ctx.arc(xP, yP, 5, 0, 2*Math.PI); ctx.fill();
    ctx.beginPath(); ctx.arc(xC, yC, 5, 0, 2*Math.PI); ctx.fill();
    ctx.font = FONT_BOLD;
    ctx.fillStyle = CRISIS;
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('$350k → ', xP + 8, yP - 10);
    ctx.font = FONT_BIG;
    ctx.textAlign = 'right';
    const inv = getInvest();
    const endVal = inv ? (cfg.isReal ? fmtMln(inv.realVal) : fmtMln(inv.nomVal)) : '—';
    ctx.fillText(endVal, xC - 8, yC - 10);
    ctx.font = FONT;
    ctx.fillStyle = AXIS;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Oct 1987', xP + 4, y1 - 18);
    ctx.textAlign = 'right';
    ctx.fillText('Feb 2021', xC - 4, y1 - 18);
    ctx.restore();
  }

  const bullAlpha = cfg.bullAlpha || 0;
  if (bullAlpha > 0.01) {
    ctx.save(); ctx.globalAlpha = bullAlpha;
    const cx = sx(1988), cy = sy(Y[ymToIdx(xs, [1988, 6])] || 320);
    const radius = Math.abs(sx(1989) - sx(1987)) / 1.5;
    ctx.strokeStyle = AXIS; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI); ctx.stroke();
    ctx.setLineDash([]);
    const iDec1989 = ymToIdx(xs, [1989, 12]);
    const dec89Price = isFinite(Y[iDec1989]) ? Y[iDec1989] : 350;
    const dx = sx(1989 + 11/12), dy = sy(dec89Price);
    ctx.fillStyle = '#c9a961';
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, 2*Math.PI); ctx.fill();
    ctx.font = '36px "Segoe UI Emoji", system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐂', dx, dy - 26);
    ctx.restore();
  }
}

// ==== drawMixed (state1 ↔ state2 morph) ====================================
function drawMixed(cfgA, cfgB, t) {
  const Y = ys();
  const { ctx, x0, y0, x1, y1 } = setupCtx();

  const xMinA = cfgA.xMin, xMaxA = cfgA.xMax;
  const xMinB = cfgB.xMin, xMaxB = cfgB.xMax;
  const xMin = lerp(xMinA, xMinB, t), xMax = lerp(xMaxA, xMaxB, t);
  const sx = v => x0 + (v - xMin) / (xMax - xMin) * (x1 - x0);

  const midY = (y0 + y1) / 2;
  const sy1 = pct => midY + (100 - pct) * (y1 - midY) / 100;
  const sy2 = (price, yClip) => y1 - price / yClip * (y1 - y0);

  const isAState2 = cfgA.kind === 'state2';
  const a2Alpha = isAState2 ? (1 - t) : t;
  const a1Alpha = 1 - a2Alpha;
  const state2Cfg = isAState2 ? cfgA : cfgB;
  const yClip = state2Cfg.yClip;

  ctx.font = FONT;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  if (a1Alpha > 0.02) {
    ctx.save(); ctx.globalAlpha = a1Alpha;
    for (const p of [100, 75, 50, 25, 0]) {
      const y = sy1(p);
      ctx.strokeStyle = p === 100 ? 'rgba(245,243,238,0.35)' : GRID;
      ctx.setLineDash(p === 100 ? [] : [2, 3]);
      ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      ctx.fillStyle = AXIS;
      ctx.fillText(fmtPct(p), x1 + 10, y);
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  if (a2Alpha > 0.02) {
    const step = yClip > 5000 ? 1000 : yClip > 2000 ? 500 : yClip > 700 ? 100 : 50;
    ctx.save(); ctx.globalAlpha = a2Alpha;
    for (let v = 0; v <= yClip + 0.1; v += step) {
      const y = sy2(v, yClip);
      ctx.strokeStyle = GRID;
      ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
      ctx.fillStyle = AXIS;
      ctx.fillText(v >= 1000 ? (v/1000) + 'k' : String(v), x1 + 10, y);
    }
    ctx.restore();
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = AXIS;
  ctx.strokeStyle = GRID;
  const xSpan = xMax - xMin;
  const xStep = xSpan > 30 ? 10 : xSpan > 10 ? 5 : 1;
  const xStart = Math.ceil(xMin / xStep) * xStep;
  for (let yr = xStart; yr <= xMax; yr += xStep) {
    const x = sx(yr);
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y1); ctx.stroke();
    ctx.fillText(String(yr), x, y1 + 8);
  }
  ctx.strokeStyle = AXIS; ctx.beginPath();
  ctx.moveTo(x0, y1); ctx.lineTo(x1, y1); ctx.stroke();

  ctx.save();
  ctx.beginPath(); ctx.rect(x0, y0, x1 - x0, y1 - y0); ctx.clip();

  if (a2Alpha > 0.02) {
    ctx.save(); ctx.globalAlpha = a2Alpha;
    const iStart = Math.max(0, ymToIdx(xs, [Math.floor(xMin), 1]));
    const iEnd = Math.min(xs.length - 1, ymToIdx(xs, [Math.ceil(xMax), 12]));
    ctx.strokeStyle = MUTED; ctx.lineWidth = 1.2;
    ctx.beginPath(); let st = false;
    for (let i = iStart; i <= iEnd; i++) {
      if (!isFinite(Y[i])) { st = false; continue; }
      const px = sx(xs[i]), py = sy2(Math.min(yClip, Y[i]), yClip);
      if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  const crisesYears = state2Cfg.visibleYears || [1973, 1987, 2000, 2007, 2020];
  const screenYAt = (i, peakPrice, kind) => {
    if (kind === 'state1') return sy1((Y[i] / peakPrice) * 100);
    return sy2(Math.min(yClip, Y[i]), yClip);
  };
  for (const c of CRISES) {
    if (!crisesYears.includes(c.peak[0])) continue;
    const iP = ymToIdx(xs, c.peak), iT = ymToIdx(xs, c.trough);
    if (iP < 0 || iT >= xs.length) continue;
    const peakPrice = Y[iP];
    if (!isFinite(peakPrice)) continue;

    ctx.strokeStyle = CRISIS; ctx.lineWidth = 2.5;
    ctx.beginPath(); let st = false;
    let lastSx = 0, lastSy = 0;
    for (let i = iP; i <= iT; i++) {
      if (!isFinite(Y[i])) continue;
      const yA = screenYAt(i, peakPrice, cfgA.kind);
      const yB = screenYAt(i, peakPrice, cfgB.kind);
      const y = lerp(yA, yB, t);
      const px = sx(xs[i]);
      lastSx = px; lastSy = y;
      if (!st) { ctx.moveTo(px, y); st = true; } else ctx.lineTo(px, y);
    }
    ctx.stroke();
    ctx.fillStyle = CRISIS;
    ctx.beginPath(); ctx.arc(lastSx, lastSy, 2.8, 0, 2 * Math.PI); ctx.fill();
    if (a2Alpha > 0.02) {
      ctx.save(); ctx.globalAlpha = a2Alpha;
      const pyA = screenYAt(iP, peakPrice, cfgA.kind);
      const pyB = screenYAt(iP, peakPrice, cfgB.kind);
      const py = lerp(pyA, pyB, t);
      ctx.beginPath(); ctx.arc(sx(xs[iP]), py, 2.8, 0, 2 * Math.PI); ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();

  const bullAlpha = (state2Cfg.bullAlpha || 0) * a2Alpha;
  if (bullAlpha > 0.02) {
    ctx.save(); ctx.globalAlpha = bullAlpha;
    const cx = sx(1988), cy = sy2(Y[ymToIdx(xs, [1988, 6])] || 320, yClip);
    const radius = Math.abs(sx(1989) - sx(1987)) / 1.5;
    ctx.strokeStyle = AXIS; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI); ctx.stroke();
    ctx.setLineDash([]);
    const iDec1989 = ymToIdx(xs, [1989, 12]);
    const dec89Price = isFinite(Y[iDec1989]) ? Y[iDec1989] : 350;
    const dx = sx(1989 + 11/12), dy = sy2(dec89Price, yClip);
    ctx.fillStyle = '#c9a961';
    ctx.beginPath(); ctx.arc(dx, dy, 5, 0, 2*Math.PI); ctx.fill();
    ctx.font = '36px "Segoe UI Emoji", system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐂', dx, dy - 26);
    ctx.restore();
  }
}

let rT;
window.addEventListener('resize', () => {
  clearTimeout(rT); rT = setTimeout(() => { PAD = computePad(); drawNow(); }, 80);
});
</script>
